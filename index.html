<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teeth Scan Viewer</title>
  </head>
  <body>
    <main id="app">
      <canvas id="scan-canvas" aria-label="3D teeth scan viewer"></canvas>

      <aside class="control-panel" aria-label="Scan controls">
        <header class="panel-header">
          <div>
            <p class="eyebrow" id="scan-source">Upload Mode</p>
            <h1>Teeth Scan</h1>
          </div>
          <button class="icon-button" id="reset-view" type="button" title="Reset view" aria-label="Reset view">
            <span aria-hidden="true">Reset</span>
          </button>
        </header>

        <section class="control-section" aria-label="Scan upload">
          <div class="section-title">Scan</div>
          <label class="file-button">
            <input id="zip-upload" type="file" accept=".zip,application/zip" />
            <span>Upload ZIP</span>
          </label>
        </section>

        <section class="control-section" aria-label="Model visibility">
          <div class="section-title">Models</div>
          <div class="model-list" id="model-list">
            <p class="empty-copy">No scan loaded</p>
          </div>
        </section>

        <section class="control-section" aria-label="Render mode">
          <div class="section-title">Mode</div>
          <div class="segmented-control" role="group" aria-label="Render mode">
            <button class="segment is-active" type="button" data-mode="vertex">Color</button>
            <button class="segment" type="button" data-mode="clay">Clay</button>
          </div>
        </section>

        <section class="control-section" aria-label="View presets">
          <div class="section-title">View</div>
          <div class="view-grid">
            <button type="button" data-view="front">Front</button>
            <button type="button" data-view="upper">Upper</button>
            <button type="button" data-view="lower">Lower</button>
            <button type="button" data-view="left">Left</button>
            <button type="button" data-view="right">Right</button>
          </div>
        </section>

        <section class="control-section" aria-label="Object rotation">
          <div class="section-title">Rotate</div>
          <label class="range-row">
            <span>X</span>
            <input id="rotate-x" type="range" min="-180" max="180" value="0" step="1" />
          </label>
          <label class="range-row">
            <span>Y</span>
            <input id="rotate-y" type="range" min="-180" max="180" value="0" step="1" />
          </label>
          <label class="range-row">
            <span>Z</span>
            <input id="rotate-z" type="range" min="-180" max="180" value="0" step="1" />
          </label>
          <button class="secondary-action" id="reset-rotation" type="button">Zero Rotation</button>
        </section>

        <section class="control-section" aria-label="Lighting controls">
          <div class="section-title">Lighting</div>
          <label class="range-row">
            <span>Key</span>
            <input id="key-light" type="range" min="0" max="2.5" value="1.25" step="0.05" />
          </label>
          <label class="range-row">
            <span>Ambient</span>
            <input id="ambient-light" type="range" min="0" max="2.5" value="0.9" step="0.05" />
          </label>
        </section>

        <section class="control-section" aria-label="Model data">
          <div class="section-title">Mesh</div>
          <dl class="stats" id="mesh-stats">
            <div>
              <dt>Status</dt>
              <dd>Upload a ZIP</dd>
            </div>
          </dl>
          <button class="primary-action" id="capture-view" type="button">Download PNG</button>
        </section>
      </aside>

      <a
        class="github-link"
        href="https://github.com/seaty6/scan_viewer"
        target="_blank"
        rel="noreferrer"
        aria-label="Open GitHub repository"
        title="GitHub repository"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.38 7.86 10.9.58.1.79-.25.79-.56v-2.15c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.56-.29-5.25-1.28-5.25-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.17 1.18A10.9 10.9 0 0 1 12 6c.98 0 1.96.13 2.88.38 2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.11 3.06.74.81 1.19 1.84 1.19 3.1 0 4.42-2.7 5.39-5.26 5.68.41.36.78 1.06.78 2.13v3.17c0 .31.21.67.79.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"
          />
        </svg>
      </a>

      <div class="gallery-strip is-hidden" aria-label="Scan photos"></div>

      <div class="loading-overlay" id="loading-overlay" role="status" aria-live="polite">
        <div class="loader"></div>
        <p id="loading-label">Loading scan</p>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
